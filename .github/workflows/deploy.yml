name: CI/CD Render
on:
  push:
    branches: [ "main" ]
permissions:
  contents: read
  packages: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Clear Docker auth
        run: |
          unset DOCKER_AUTH_CONFIG
          rm -f ~/.docker/config.json || true
          mkdir -p ~/.docker
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker image
        env:
          IMAGE_URL: ghcr.io/${{ steps.lower.outputs.owner }}/flask-render-iac
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${IMAGE_URL}:${IMAGE_TAG} .
          docker push ${IMAGE_URL}:${IMAGE_TAG}
          echo "IMAGE_URL=${IMAGE_URL}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      - name: Compute Render service name
        run: |
          SERVICE_NAME="flask-render-iac-${{ github.actor }}"
          echo "SERVICE_NAME=${SERVICE_NAME}" >> $GITHUB_ENV
          echo "Using Render service name: ${SERVICE_NAME}"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Delete ALL existing Render services for this project
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            https://api.render.com/v1/services)

          echo "All Render services:"
          echo "$RESPONSE" | jq -r '.[] | select(.service != null) | "\(.service.name) (\(.service.id))"'

          # Extraire TOUS les IDs de services
          SERVICE_IDS=$(echo "$RESPONSE" \
            | jq -r '.[] | select(type=="object" and .service != null) | .service.id')

          if [ -z "$SERVICE_IDS" ]; then
            echo "No existing Render services found. Nothing to delete."
          else
            for SID in $SERVICE_IDS; do
              echo "Deleting service: ${SID}"
              curl -s -X DELETE \
                -H "Authorization: Bearer ${RENDER_API_KEY}" \
                "https://api.render.com/v1/services/${SID}"
            done
          fi

          # Supprimer aussi les bases de données PostgreSQL
          DB_RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            https://api.render.com/v1/postgres)

          DB_IDS=$(echo "$DB_RESPONSE" \
            | jq -r '.[] | select(type=="object" and .postgres != null) | .postgres.id')

          if [ -z "$DB_IDS" ]; then
            echo "No existing Render databases found."
          else
            for DID in $DB_IDS; do
              echo "Deleting database: ${DID}"
              curl -s -X DELETE \
                -H "Authorization: Bearer ${RENDER_API_KEY}" \
                "https://api.render.com/v1/postgres/${DID}"
            done
          fi
      - name: Wait after delete (Rajout de temps vu que la bdd se suppr également)
        run: sleep 30
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
        working-directory: terraform
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="render_api_key=${{ secrets.RENDER_API_KEY }}" \
            -var="render_owner_id=${{ secrets.RENDER_OWNER_ID }}" \
            -var="image_url=${IMAGE_URL}" \
            -var="image_tag=${IMAGE_TAG}" \
            -var="github_actor=${{ github.actor }}"
        working-directory: terraform